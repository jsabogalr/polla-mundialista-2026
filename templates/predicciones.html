<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pronósticos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>📝 Pronósticos</h1>

    <h3>{{ usuario.nombre }}</h3>

    <hr>

    <form method="POST">

        {% if partidos %}

            {% for partido in partidos %}

            <div class="card mb-3">

                <div class="card-body">

                    <h5>
                        {{ partido.equipo_local }}
                        vs
                        {{ partido.equipo_visitante }}
                    </h5>

                    <div class="row">

                        <div class="col">
                            <input
                                type="number"
                                name="local_{{ partido.id }}"
                                class="form-control"
                                placeholder="Local"
                                min="0">
                        </div>

                        <div class="col">
                            <input
                                type="number"
                                name="visitante_{{ partido.id }}"
                                class="form-control"
                                placeholder="Visitante"
                                min="0">
                        </div>

                    </div>

                </div>

            </div>

            {% endfor %}

            <button
                type="submit"
                class="btn btn-success">
                Guardar Pronósticos
            </button>

        {% endif %}

    </form>

</div>

</body>
</html>
