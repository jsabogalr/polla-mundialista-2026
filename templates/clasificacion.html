<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clasificación</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">🏆 Clasificación Mundialista</h1>

    <table class="table table-striped table-bordered">

        <thead class="table-dark">
            <tr>
                <th>Posición</th>
                <th>Participante</th>
                <th>Puntos</th>
                <th>Exactos</th>
            </tr>
        </thead>

        <tbody>

        {% for fila in tabla %}

            <tr>

                <td>
                    {% if loop.index == 1 %}
                        🥇
                    {% elif loop.index == 2 %}
                        🥈
                    {% elif loop.index == 3 %}
                        🥉
                    {% else %}
                        {{ loop.index }}
                    {% endif %}
                </td>

                <td>{{ fila.nombre }}</td>
                <td>{{ fila.puntos }}</td>
                <td>{{ fila.exactos }}</td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
